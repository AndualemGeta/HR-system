name: MVP CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://leapfrog:leapfrog123@localhost:5433/leapfrog_hr
  AUTH_SECRET: ci-test-auth-secret-not-used-in-production
  NODE_ENV: test
  MVP_MODE: "true"
  TEST_PORT: 3003
  TEST_BASE_URL: http://127.0.0.1:3003
  PAYROLL_EXPORT_DIR: ${{ runner.temp }}/payroll-exports

jobs:
  mvp-release:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: leapfrog
          POSTGRES_PASSWORD: leapfrog123
          POSTGRES_DB: leapfrog_hr
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Deploy database migrations
        run: npx prisma migrate deploy

      - name: Seed CI database
        run: npm run prisma:seed:ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:mvp

      - name: E2E tests
        run: npm run test:mvp-e2e

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: UI tests
        run: npm run test:ui-e2e

      - name: Upload payroll workbook artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: payroll-workbook
          path: ${{ runner.temp }}/payroll-exports/
          retention-days: 30
