name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: leapfrog
          POSTGRES_PASSWORD: leapfrog
          POSTGRES_DB: leapfrog_hr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run prisma:generate

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run build

      - name: Setup database
        run: npx prisma db push --force-reset && npx tsx prisma/seed.ts
        env:
          DATABASE_URL: postgresql://leapfrog:leapfrog@localhost:5432/leapfrog_hr

      - name: Run Phase 4C.2 unit tests
        run: npx tsx src/test/phase4c2-tests.ts
        env:
          DATABASE_URL: postgresql://leapfrog:leapfrog@localhost:5432/leapfrog_hr

      - name: Run Phase 4C.2 e2e tests
        run: npx tsx src/test/phase4c2-e2e-tests.ts
        env:
          DATABASE_URL: postgresql://leapfrog:leapfrog@localhost:5432/leapfrog_hr
