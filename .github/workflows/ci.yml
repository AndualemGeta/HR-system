name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://leapfrog:leapfrog123@localhost:5433/leapfrog_hr
  AUTH_SECRET: ci-test-auth-secret-not-used-in-production
  NODE_ENV: test
  TEST_PORT: 3001
  TEST_BASE_URL: http://127.0.0.1:3001

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: leapfrog
          POSTGRES_PASSWORD: leapfrog123
          POSTGRES_DB: leapfrog_hr
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: TypeScript type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deploy database migrations
        run: npx prisma migrate deploy

      - name: Seed CI database
        run: npm run prisma:seed:ci

      - name: Run all tests
        run: npm test

      - name: Run Phase 4C.2 E2E tests
        run: npm run test:phase4c2-e2e

      - name: Run Phase 5A tests
        run: npm run test:phase5a

      - name: Run Phase 5A E2E tests
        run: npm run test:phase5a-e2e

      - name: Run Phase 5B tests
        run: npm run test:phase5b

      - name: Run KPI assignment tests
        run: npm run test:kpi-assignment

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run UI E2E tests
        run: npm run test:ui-e2e
