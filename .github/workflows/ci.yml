name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: leapfrog
          POSTGRES_PASSWORD: leapfrog123
          POSTGRES_DB: leapfrog_hr
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://leapfrog:leapfrog123@localhost:5433/leapfrog_hr

      - name: TypeScript type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://leapfrog:leapfrog123@localhost:5433/leapfrog_hr

      - name: Push database schema
        run: npx prisma db push --force-reset
        env:
          DATABASE_URL: postgresql://leapfrog:leapfrog123@localhost:5433/leapfrog_hr

      - name: Seed database
        run: npm run prisma:seed
        env:
          DATABASE_URL: postgresql://leapfrog:leapfrog123@localhost:5433/leapfrog_hr

      - name: Run all tests
        run: npm test
        env:
          DATABASE_URL: postgresql://leapfrog:leapfrog123@localhost:5433/leapfrog_hr

      - name: Run Phase 4C.2 E2E tests
        run: npm run test:phase4c2-e2e
        env:
          DATABASE_URL: postgresql://leapfrog:leapfrog123@localhost:5433/leapfrog_hr

      - name: Run Phase 5A tests
        run: npm run test:phase5a
        env:
          DATABASE_URL: postgresql://leapfrog:leapfrog123@localhost:5433/leapfrog_hr

      - name: Run Phase 5A E2E tests
        run: npm run test:phase5a-e2e
        env:
          DATABASE_URL: postgresql://leapfrog:leapfrog123@localhost:5433/leapfrog_hr
          TEST_PORT: 3001
